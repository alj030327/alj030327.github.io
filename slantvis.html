<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slantvis — budget</title>
<meta name="theme-color" content="#15302A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Slantvis">
<link rel="apple-touch-icon" id="pwa_ati">
<link rel="icon" id="pwa_favi">
<link rel="manifest" id="pwa_mani">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg:#EEF1EB;
  --surface:#FFFFFF;
  --ink:#15302A;
  --ink-soft:#5C6B61;
  --line:#DCE3DA;
  --line-soft:#E8EDE5;
  --behov:#2E7D74;
  --onsk:#C2853A;
  --spar:#3F8F5B;
  --debt:#C25A43;
  --behov-bg:#E5F0EE;
  --onsk-bg:#F4EBDD;
  --spar-bg:#E5F1E9;
  --debt-bg:#F6E6E1;
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 1px 2px rgba(21,48,42,.04), 0 8px 24px rgba(21,48,42,.05);
  --font-display:'Bricolage Grotesque','Inter',system-ui,sans-serif;
  --font-body:'Inter',system-ui,-apple-system,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.tnum{font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:15px}
h1,h2,h3{font-family:var(--font-display);font-weight:700;letter-spacing:-.02em;line-height:1.1}

/* ---------- shell ---------- */
.app{display:flex;min-height:100vh}

.sidebar{
  width:236px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--line);
  padding:22px 16px;
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 22px}
.brand-mark{
  width:30px;height:30px;border-radius:9px;flex-shrink:0;
  background:var(--ink);color:#EAF3EE;
  display:grid;place-items:center;font-family:var(--font-display);font-weight:800;font-size:17px;
}
.brand-name{font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:-.02em}
.brand-name small{display:block;font-family:var(--font-body);font-weight:500;font-size:11px;color:var(--ink-soft);letter-spacing:0;margin-top:-1px}

.nav{display:flex;flex-direction:column;gap:2px}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:var(--radius-sm);
  color:var(--ink-soft);font-weight:500;font-size:14.5px;
  text-align:left;width:100%;transition:background .14s,color .14s;
}
.nav-item svg{width:19px;height:19px;flex-shrink:0}
.nav-item:hover{background:var(--line-soft);color:var(--ink)}
.nav-item.active{background:var(--ink);color:#EAF3EE;font-weight:600}
.nav-spacer{flex:1}
.nav-foot{padding:10px 12px;border-radius:var(--radius-sm);color:var(--ink-soft);font-size:13.5px;display:flex;align-items:center;gap:10px;width:100%}
.nav-foot:hover{background:var(--line-soft);color:var(--ink)}
.nav-foot svg{width:18px;height:18px}

.main{flex:1;min-width:0;padding:30px 36px 60px;max-width:1080px;margin:0 auto;width:100%}

.topbar{display:none}

/* ---------- view header ---------- */
.view-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.view-head .eyebrow{font-size:12.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft)}
.view-head h1{font-size:29px;margin-top:3px}
.view-head p.sub{color:var(--ink-soft);font-size:14px;margin-top:4px}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--ink);color:#EAF3EE;
  padding:10px 16px;border-radius:11px;font-weight:600;font-size:14px;
  transition:transform .1s,filter .14s;white-space:nowrap;
}
.btn:hover{filter:brightness(1.12)}
.btn:active{transform:translateY(1px)}
.btn svg{width:16px;height:16px}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{filter:none;background:var(--line-soft)}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:9px}
.btn-danger{background:var(--debt);color:#fff}
.iconbtn{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:var(--ink-soft);transition:background .14s,color .14s}
.iconbtn:hover{background:var(--line-soft);color:var(--ink)}
.iconbtn svg{width:16px;height:16px}

/* ---------- cards / grid ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-2{grid-template-columns:repeat(2,1fr)}

/* hero */
.hero{padding:24px 26px;margin-bottom:18px}
.hero .lbl{font-size:13px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft)}
.hero .big{font-family:var(--font-display);font-weight:800;font-size:46px;letter-spacing:-.03em;margin:6px 0 2px;line-height:1}
.hero .big.warn{color:var(--debt)}
.hero .hint{color:var(--ink-soft);font-size:13.5px}
.hero-stats{display:flex;gap:28px;margin-top:20px;flex-wrap:wrap}
.hero-stat .k{font-size:12.5px;color:var(--ink-soft);font-weight:500}
.hero-stat .v{font-family:var(--font-display);font-weight:700;font-size:20px;margin-top:1px}

/* allocation bar */
.alloc-wrap{margin-top:22px}
.alloc{display:flex;height:14px;border-radius:8px;overflow:hidden;background:var(--line-soft)}
.alloc-seg{height:100%;transition:width .4s ease}
.alloc-legend{display:flex;gap:22px;margin-top:14px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:8px;font-size:13px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.leg .lk{color:var(--ink-soft)}
.leg b{font-weight:600}
.alloc-note{margin-top:12px;font-size:13px;color:var(--debt);font-weight:500}

/* bucket cards */
.bucket{padding:18px 20px}
.bucket-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.bucket-name{display:flex;align-items:center;gap:9px;font-family:var(--font-display);font-weight:700;font-size:16px}
.bucket-pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.bucket-amt{display:flex;align-items:baseline;gap:6px;margin-bottom:3px}
.bucket-amt .spent{font-family:var(--font-display);font-weight:700;font-size:24px}
.bucket-amt .of{color:var(--ink-soft);font-size:14px}
.bucket-sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:12px}

/* progress */
.bar{height:8px;border-radius:6px;background:var(--line-soft);overflow:hidden}
.bar > i{display:block;height:100%;border-radius:6px;transition:width .4s ease}

/* section block */
.section{margin-top:26px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:12px}
.section-head h2{font-size:19px}
.section-head .small{font-size:13px;color:var(--ink-soft)}

/* list rows */
.rows{display:flex;flex-direction:column}
.row{display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid var(--line-soft)}
.row:last-child{border-bottom:none}
.row .lead{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.row .title{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .meta{font-size:12.5px;color:var(--ink-soft);margin-top:1px}
.row .amt{font-family:var(--font-body);font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
.row .actions{display:flex;gap:2px}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.avatar{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-weight:700;font-size:14px;flex-shrink:0;font-family:var(--font-display)}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--line-soft);color:var(--ink-soft);margin-left:8px;vertical-align:middle}
.tag.warn{background:var(--debt-bg);color:var(--debt)}
.tag.good{background:var(--spar-bg);color:var(--spar)}

/* category sub-rows inside budget */
.cat-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-soft)}
.cat-row:last-child{border-bottom:none}
.cat-row .cinfo{flex:1;min-width:0}
.cat-row .cname{font-weight:600;font-size:14px}
.cat-row .cbar{margin-top:6px}
.cat-row .cnums{font-size:12.5px;color:var(--ink-soft);margin-top:3px}
.cat-row .cright{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
.subtotal{display:flex;justify-content:space-between;align-items:center;padding-top:14px;margin-top:6px;border-top:1px dashed var(--line);font-size:13.5px}
.subtotal b{font-family:var(--font-display);font-size:16px}

/* goals */
.goal{padding:18px 20px}
.goal h3{font-size:17px;margin-bottom:2px}
.goal .gmeta{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px}
.goal .gnums{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.goal .gcur{font-family:var(--font-display);font-weight:700;font-size:22px}
.goal .gtar{color:var(--ink-soft);font-size:13px}
.goal .gfoot{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.goal .gleft{font-size:12.5px;color:var(--ink-soft)}

/* donut + insights */
.donut-card{padding:22px;display:flex;gap:28px;align-items:center;flex-wrap:wrap}
.donut{position:relative;flex-shrink:0}
.donut .center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.donut .center .dv{font-family:var(--font-display);font-weight:800;font-size:21px;line-height:1}
.donut .center .dk{font-size:11px;color:var(--ink-soft);margin-top:2px}
.donut-legend{flex:1;min-width:180px;display:flex;flex-direction:column;gap:11px}
.dleg{display:flex;align-items:center;gap:10px;font-size:13.5px}
.dleg .dname{flex:1}
.dleg .dval{font-weight:600;font-variant-numeric:tabular-nums}
.dleg .dpct{color:var(--ink-soft);font-size:12px;width:38px;text-align:right}

.minibar{display:flex;align-items:center;gap:12px;padding:9px 0}
.minibar .mlab{width:130px;font-size:13px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.minibar .mtrack{flex:1;height:9px;border-radius:6px;background:var(--line-soft);overflow:hidden}
.minibar .mtrack > i{display:block;height:100%;border-radius:6px}
.minibar .mval{width:78px;text-align:right;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;flex-shrink:0}

/* empty */
.empty{text-align:center;padding:46px 20px;color:var(--ink-soft)}
.empty h3{color:var(--ink);font-size:18px;margin-bottom:6px}
.empty p{font-size:14px;max-width:340px;margin:0 auto 16px}

.banner{display:flex;align-items:center;gap:14px;padding:15px 18px;border-radius:var(--radius);margin-bottom:18px;font-size:14px}
.banner.info{background:var(--behov-bg);color:#1f5d56}
.banner.warn{background:var(--debt-bg);color:#9a3a28}
.banner b{font-weight:700}
.banner .bicon{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex-shrink:0;background:rgba(255,255,255,.6)}
.banner .bicon svg{width:18px;height:18px}

.note{font-size:13px;color:var(--ink-soft);background:var(--line-soft);padding:11px 14px;border-radius:11px;margin-top:14px;line-height:1.55}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(21,48,42,.34);backdrop-filter:blur(2px);display:none;align-items:flex-end;justify-content:center;z-index:50;padding:0}
.overlay.open{display:flex}
.modal{background:var(--surface);width:100%;max-width:440px;border-radius:22px 22px 0 0;padding:24px 22px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -10px 40px rgba(0,0,0,.16);animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:.6}to{transform:translateY(0);opacity:1}}
.modal h2{font-size:21px;margin-bottom:3px}
.modal .msub{color:var(--ink-soft);font-size:13.5px;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink)}
.field input,.field select{
  width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;
  background:#fff;color:var(--ink);transition:border-color .14s,box-shadow .14s;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(21,48,42,.08)}
.field .suffix{position:relative}
.field .suffix span{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--ink-soft);font-size:13px;pointer-events:none}
.field .suffix input{padding-right:38px}
.check{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:14px;cursor:pointer}
.check input{width:18px;height:18px;accent-color:var(--ink)}
.modal-actions{display:flex;gap:10px;margin-top:22px}
.modal-actions .btn{flex:1;justify-content:center}
.modal-actions .btn-ghost{flex:0 0 auto;padding-left:18px;padding-right:18px}
.field-row{display:flex;gap:12px}
.field-row .field{flex:1}

.settings-opt{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 0;border-bottom:1px solid var(--line-soft)}
.settings-opt:last-of-type{border-bottom:none}
.settings-opt .so-t{font-weight:600;font-size:14px}
.settings-opt .so-d{font-size:12.5px;color:var(--ink-soft);margin-top:2px}

@media (min-width:781px){.main{padding-top:34px}}

/* ---------- mobile ---------- */
@media (max-width:780px){
  .sidebar{display:none}
  .app{flex-direction:column}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;background:var(--surface);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20;
  }
  .topbar .brand{padding:0}
  .main{padding:20px 16px 96px;max-width:100%}
  .view-head h1{font-size:25px}
  .hero .big{font-size:40px}
  .cols-3,.cols-2{grid-template-columns:1fr}
  .bottomnav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:30;
    background:var(--surface);border-top:1px solid var(--line);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    justify-content:space-around;
  }
  .bn-item{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--ink-soft);font-size:10.5px;font-weight:500;padding:4px 8px;border-radius:10px;flex:1;
  }
  .bn-item svg{width:21px;height:21px}
  .bn-item.active{color:var(--ink);font-weight:600}
  .donut-card{justify-content:center}
  .minibar .mlab{width:96px}
  .overlay{align-items:flex-end}
}
@media (min-width:781px){.bottomnav{display:none}}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.imp-preview{max-height:150px;overflow:auto;border:1px solid var(--line);border-radius:10px;margin:6px 0 14px}
.imp-preview table{border-collapse:collapse;font-size:11.5px;white-space:nowrap;width:100%}
.imp-preview th,.imp-preview td{padding:5px 9px;border-bottom:1px solid var(--line-soft);text-align:left;color:var(--ink-soft)}
.imp-preview th{position:sticky;top:0;background:var(--surface);color:var(--ink);font-weight:600}
</style>

/* ---------- lagring (window.storage → localStorage → minne) ---------- */
const Store = {
  mem:{},
  _ls(){ try{ return window.localStorage || null; }catch(e){ return null; } },
  async get(k){
    try{ if(window.storage && window.storage.get){ const r = await window.storage.get(k); return r ? r.value : null; } }catch(e){}
    const ls=this._ls(); if(ls){ try{ return ls.getItem(k); }catch(e){} }
    return (k in this.mem) ? this.mem[k] : null;
  },
  async set(k,v){
    try{ if(window.storage && window.storage.set){ await window.storage.set(k,v); return; } }catch(e){}
    const ls=this._ls(); if(ls){ try{ ls.setItem(k,v); return; }catch(e){} }
    this.mem[k] = v;
  }
};
const KEY = 'slantvis_state_v1';

/* ---------- hjälpfunktioner ---------- */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

const krc = n => Math.round(Number(n)||0).toLocaleString('sv-SE');
const pct = (a,b) => b>0 ? Math.round((a/b)*100) : 0;
const clampPct = p => Math.max(0, Math.min(100, p));
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const NOW = new Date();
const YM = NOW.getFullYear() + '-' + String(NOW.getMonth()+1).padStart(2,'0');
const inThisMonth = d => (d||'').slice(0,7) === YM;
const TODAY = NOW.getFullYear() + '-' + String(NOW.getMonth()+1).padStart(2,'0') + '-' + String(NOW.getDate()).padStart(2,'0');
function monthLabel(){ const s = NOW.toLocaleDateString('sv-SE',{month:'long',year:'numeric'}); return s.charAt(0).toUpperCase()+s.slice(1); }
function dShort(d){ try{ return new Date(d+'T00:00:00').toLocaleDateString('sv-SE',{day:'numeric',month:'short'}); }catch(e){ return d; } }

const BUCKETS = {
  behov:{label:'Behov', color:'var(--behov)', bg:'var(--behov-bg)', target:0.50, hint:'Det du måste betala'},
  onsk :{label:'Önskningar', color:'var(--onsk)', bg:'var(--onsk-bg)', target:0.30, hint:'Det du vill ha'},
  spar :{label:'Sparande & skuld', color:'var(--spar)', bg:'var(--spar-bg)', target:0.20, hint:'Framtid & avbetalningar'},
};
const BKEYS = ['behov','onsk','spar'];

/* ---------- exempeldata ---------- */
function seedState(){
  const c = (name,bucket,budget) => ({id:uid(), name, bucket, budget});
  const cats = [
    c('Hyra','behov',9000), c('Mat & hushåll','behov',3400), c('SL-kort','behov',1010),
    c('El & internet','behov',750), c('Försäkringar','behov',540), c('Mobil','behov',300),
    c('Minsta skuldbetalning','behov',1000),
    c('Restaurang & café','onsk',2500), c('Nöje & uteliv','onsk',1500), c('Shopping','onsk',2000),
    c('Prenumerationer','onsk',1200), c('Gym','onsk',400), c('Kläder & skönhet','onsk',2000),
    c('Buffertsparande','spar',3000), c('Investeringar (ISK)','spar',2500), c('Extra skuldavbetalning','spar',900),
  ];
  const byName = n => (cats.find(x=>x.name===n)||{}).id;
  const t = (desc,cat,amount,date,rec=false) => ({id:uid(), desc, categoryId:byName(cat), amount, date, recurring:rec});
  const d = n => YM + '-' + String(n).padStart(2,'0');
  const trans = [
    t('Hyra '+monthLabel().split(' ')[0],'Hyra',9000,d(1)),
    t('SL månadskort','SL-kort',1010,d(1)),
    t('Spotify','Prenumerationer',129,d(2),true),
    t('Netflix','Prenumerationer',139,d(2),true),
    t('iCloud+','Prenumerationer',29,d(2),true),
    t('Nordic Wellness','Gym',449,d(3),true),
    t('ICA Maxi','Mat & hushåll',842,d(4)),
    t('Lunch ute','Restaurang & café',135,d(5)),
    t('Coop','Mat & hushåll',413,d(8)),
    t('Bryggan kaffe','Restaurang & café',62,d(9)),
    t('Biobiljetter','Nöje & uteliv',260,d(11)),
    t('Zalando','Shopping',699,d(12)),
    t('Comviq','Mobil',295,d(2),true),
    t('Hemförsäkring','Försäkringar',189,d(2)),
    t('Vattenfall el','El & internet',640,d(3)),
  ];
  return {
    income:[{id:uid(), name:'Lön (netto)', amount:32000}],
    categories:cats,
    transactions:trans,
    goals:[
      {id:uid(), name:'Buffert (3 mån utgifter)', target:60000, saved:24000, deadline:''},
      {id:uid(), name:'Resa', target:20000, saved:6500, deadline:''},
    ],
    debts:[
      {id:uid(), name:'Kreditkort', balance:18000, apr:22.0, min:700},
      {id:uid(), name:'Privatlån', balance:35000, apr:8.5, min:1200},
      {id:uid(), name:'Avbetalning mobil', balance:6000, apr:0, min:300},
    ],
  };
}
function emptyState(){ return {income:[],categories:[],transactions:[],goals:[],debts:[]}; }

/* ---------- state ---------- */
let state = emptyState();
let csvImportRows = null;
let view = 'oversikt';

async function load(){
  const raw = await Store.get(KEY);
  if(raw){ try{ state = JSON.parse(raw); }catch(e){ state = seedState(); await persist(); } }
  else { state = seedState(); await persist(); }
}
function persist(){ return Store.set(KEY, JSON.stringify(state)); }

/* ---------- avledda värden ---------- */
const monthlyIncome = () => sum(state.income.map(i=>i.amount));
const catsOf = b => state.categories.filter(c=>c.bucket===b);
const catSpent = id => sum(state.transactions.filter(t=>t.categoryId===id && inThisMonth(t.date)).map(t=>t.amount));
const bucketBudget = b => sum(catsOf(b).map(c=>c.budget));
const bucketSpent = b => sum(catsOf(b).map(c=>catSpent(c.id)));
const allocated = () => sum(state.categories.map(c=>c.budget));
const spentTotal = () => sum(state.transactions.filter(t=>inThisMonth(t.date)).map(t=>t.amount));
const catName = id => { const c = state.categories.find(x=>x.id===id); return c?c.name:'Okategoriserat'; };
const catBucket = id => { const c = state.categories.find(x=>x.id===id); return c?c.bucket:null; };

/* ============================================================
   NAVIGERING
   ============================================================ */
const NAVITEMS = [
  ['oversikt','Översikt'], ['budget','Budget'], ['trans','Transaktioner'],
  ['goal','Sparmål'], ['debt','Skulder'], ['insikt','Insikter'],
];
function renderNav(){
  document.getElementById('nav').innerHTML = NAVITEMS.map(([k,l])=>
    `<button class="nav-item ${view===k?'active':''}" data-nav="${k}">${I[k]}<span>${l}</span></button>`).join('');
  document.getElementById('bottomnav').innerHTML = NAVITEMS.map(([k,l])=>
    `<button class="bn-item ${view===k?'active':''}" data-nav="${k}">${I[k]}<span>${l}</span></button>`).join('');
}
function setView(v){ view = v; renderNav(); render(); window.scrollTo(0,0); }

/* ============================================================
   VYER
   ============================================================ */
function render(){
  const el = document.getElementById('main');
  if(view==='oversikt') el.innerHTML = viewOversikt();
  else if(view==='budget') el.innerHTML = viewBudget();
  else if(view==='trans') el.innerHTML = viewTrans();
  else if(view==='goal') el.innerHTML = viewGoals();
  else if(view==='debt') el.innerHTML = viewDebts();
  else if(view==='insikt') el.innerHTML = viewInsikter();
}

/* ---- gemensam header ---- */
function head(eyebrow, title, sub, actionHtml){
  return `<div class="view-head"><div>
    <div class="eyebrow">${eyebrow}</div><h1>${title}</h1>
    ${sub?`<p class="sub">${sub}</p>`:''}
  </div>${actionHtml||''}</div>`;
}
function barFill(spent, budget, color){
  const p = clampPct(pct(spent,budget));
  const over = budget>0 && spent>budget;
  return `<div class="bar"><i style="width:${p}%;background:${over?'var(--debt)':color}"></i></div>`;
}

/* ===================== ÖVERSIKT ===================== */
function viewOversikt(){
  const inc = monthlyIncome(), alloc = allocated(), spent = spentTotal();
  const left = inc - alloc;
  const base = Math.max(inc, alloc, 1);
  const segs = BKEYS.map(b=>({b, w: bucketBudget(b)/base*100, color:BUCKETS[b].color}));
  const restW = inc>alloc ? (inc-alloc)/base*100 : 0;

  const heroBig = left===0
    ? `<div class="big">Balanserad</div><div class="hint">Varje krona har ett jobb — snyggt jobbat.</div>`
    : left>0
      ? `<div class="big tnum">${kr(left)}</div><div class="hint">Kvar att budgetera den här månaden.</div>`
      : `<div class="big warn tnum">${kr(left)}</div><div class="hint">Du har budgeterat mer än din inkomst.</div>`;

  const hero = `<div class="card hero">
    <div class="lbl">Att fördela · ${monthLabel()}</div>
    ${heroBig}
    <div class="hero-stats">
      <div class="hero-stat"><div class="k">Inkomst</div><div class="v tnum">${kr(inc)}</div></div>
      <div class="hero-stat"><div class="k">Budgeterat</div><div class="v tnum">${kr(alloc)}</div></div>
      <div class="hero-stat"><div class="k">Spenderat hittills</div><div class="v tnum">${kr(spent)}</div></div>
    </div>
    <div class="alloc-wrap">
      <div class="alloc">
        ${segs.map(s=>`<div class="alloc-seg" style="width:${s.w}%;background:${s.color}"></div>`).join('')}
        ${restW>0?`<div class="alloc-seg" style="width:${restW}%;background:var(--line-soft)"></div>`:''}
      </div>
      <div class="alloc-legend">
        ${BKEYS.map(b=>`<div class="leg"><span class="dot" style="background:${BUCKETS[b].color}"></span>
          <span class="lk">${BUCKETS[b].label}</span> <b class="tnum">${kr(bucketBudget(b))}</b>
          <span class="lk">· ${pct(bucketBudget(b),inc)}%</span></div>`).join('')}
      </div>
      ${alloc>inc?`<div class="alloc-note">Minska budgeten med ${kr(alloc-inc)} för att gå jämnt ut.</div>`:''}
    </div>
  </div>`;

  const buckets = `<div class="grid cols-3" style="margin-bottom:6px">${BKEYS.map(bucketCard).join('')}</div>`;

  // sparmål mini
  const goals = state.goals.length ? `<div class="section">
    <div class="section-head"><h2>Sparmål</h2><button class="nav-item" style="width:auto;padding:6px 10px" data-nav="goal"><span class="small">Visa alla →</span></button></div>
    <div class="grid cols-2">${state.goals.slice(0,2).map(goalCard).join('')}</div>
  </div>` : '';

  // skuld mini
  const totalDebt = sum(state.debts.map(d=>d.balance));
  const debtMini = state.debts.length ? `<div class="section">
    <div class="section-head"><h2>Skulder</h2><button class="nav-item" style="width:auto;padding:6px 10px" data-nav="debt"><span class="small">Visa alla →</span></button></div>
    <div class="card" style="padding:18px 20px">
      <div style="display:flex;align-items:baseline;justify-content:space-between">
        <div><div class="lbl" style="font-size:12px;color:var(--ink-soft);font-weight:600">Total skuld</div>
        <div style="font-family:var(--font-display);font-weight:800;font-size:30px;margin-top:2px" class="tnum">${kr(totalDebt)}</div></div>
        <div style="text-align:right;font-size:12.5px;color:var(--ink-soft)">${state.debts.length} skulder<br>Minsta/mån: <b class="tnum">${kr(sum(state.debts.map(d=>d.min)))}</b></div>
      </div>
    </div>
  </div>` : '';

  // senaste transaktioner
  const recent = [...state.transactions].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,6);
  const recentHtml = recent.length ? `<div class="section">
    <div class="section-head"><h2>Senaste transaktioner</h2>
      <button class="btn btn-ghost btn-sm" data-action="add-trans">${I.plus} Lägg till</button></div>
    <div class="card"><div class="rows">${recent.map(txRow).join('')}</div></div>
  </div>` : `<div class="section"><div class="card empty">
    <h3>Inga transaktioner än</h3><p>Lägg in dina utgifter så ser du direkt hur de ligger mot budgeten.</p>
    <button class="btn" data-action="add-trans">${I.plus} Lägg till transaktion</button></div></div>`;

  const action = `<button class="btn" data-action="add-trans">${I.plus} Lägg till transaktion</button>`;
  return head('Hej · '+monthLabel(), 'Översikt', null, action) + hero + buckets + goals + debtMini + recentHtml;
}

function bucketCard(b){
  const m = BUCKETS[b];
  const budget = bucketBudget(b), spent = bucketSpent(b);
  const inc = monthlyIncome();
  const share = pct(budget, inc), tgt = Math.round(m.target*100);
  const over = budget>0 && spent>budget;
  return `<div class="card bucket">
    <div class="bucket-top">
      <div class="bucket-name"><span class="dot" style="width:11px;height:11px;background:${m.color}"></span>${m.label}</div>
      <div class="bucket-pill" style="background:${m.bg};color:${m.color}">${share}% · mål ${tgt}%</div>
    </div>
    <div class="bucket-amt"><span class="spent tnum" ${over?'style="color:var(--debt)"':''}>${kr(spent)}</span><span class="of tnum">av ${kr(budget)}</span></div>
    <div class="bucket-sub">${budget>0 ? (over?`${kr(spent-budget)} över budget`:`${kr(budget-spent)} kvar`) : 'Ingen budget satt'}</div>
    ${barFill(spent,budget,m.color)}
  </div>`;
}

function txRow(t){
  const b = catBucket(t.categoryId);
  const color = b ? BUCKETS[b].color : 'var(--ink-soft)';
  return `<div class="row">
    <div class="lead">
      <span class="cdot" style="background:${color}"></span>
      <div style="min-width:0">
        <div class="title">${esc(t.desc)||'(utan namn)'}${t.recurring?'<span class="tag">prenumeration</span>':''}</div>
        <div class="meta">${esc(catName(t.categoryId))} · ${dShort(t.date)}</div>
      </div>
    </div>
    <div class="amt">−${kr(t.amount)}</div>
    <div class="actions">
      <button class="iconbtn" data-action="edit-trans" data-id="${t.id}" aria-label="Ändra">${I.edit}</button>
      <button class="iconbtn" data-action="del-trans" data-id="${t.id}" aria-label="Ta bort">${I.trash}</button>
    </div>
  </div>`;
}

/* ===================== BUDGET ===================== */
function viewBudget(){
  const inc = monthlyIncome(), alloc = allocated(), left = inc - alloc;
  const banner = left===0
    ? `<div class="banner info"><div class="bicon">${I.check}</div><div><b>Allt fördelat.</b> Hela inkomsten på ${kr(inc)} har ett jobb — det är så det ska se ut.</div></div>`
    : left>0
      ? `<div class="banner info"><div class="bicon">${I.info}</div><div><b class="tnum">${kr(left)}</b> kvar att fördela. Ge varje krona ett jobb: lägg dem i en kategori eller öka sparandet.</div></div>`
      : `<div class="banner warn"><div class="bicon">${I.info}</div><div>Du har fördelat <b class="tnum">${kr(-left)}</b> mer än din inkomst. Dra ner någonstans tills du går jämnt ut.</div></div>`;

  const sections = BKEYS.map(b=>{
    const m = BUCKETS[b], cats = catsOf(b);
    const budget = bucketBudget(b), spent = bucketSpent(b);
    const tgt = Math.round(m.target*inc);
    const rows = cats.length ? cats.map(c=>{
      const s = catSpent(c.id), over = c.budget>0 && s>c.budget;
      return `<div class="cat-row">
        <div class="cinfo">
          <div class="cname">${esc(c.name)}</div>
          <div class="cbar">${barFill(s,c.budget,m.color)}</div>
          <div class="cnums">${kr(s)} av ${kr(c.budget)}${over?` · <span style="color:var(--debt)">${kr(s-c.budget)} över</span>`:''}</div>
        </div>
        <div class="cright">${kr(c.budget)}</div>
        <div class="actions">
          <button class="iconbtn" data-action="edit-cat" data-id="${c.id}" aria-label="Ändra">${I.edit}</button>
          <button class="iconbtn" data-action="del-cat" data-id="${c.id}" aria-label="Ta bort">${I.trash}</button>
        </div>
      </div>`;
    }).join('') : `<div style="padding:14px 0;color:var(--ink-soft);font-size:13.5px">Inga kategorier än.</div>`;

    return `<div class="card" style="padding:18px 20px;margin-bottom:16px">
      <div class="bucket-top">
        <div class="bucket-name"><span class="dot" style="width:11px;height:11px;background:${m.color}"></span>${m.label}
          <span style="font-weight:500;font-family:var(--font-body);font-size:12.5px;color:var(--ink-soft);margin-left:4px">${m.hint}</span></div>
        <button class="btn btn-ghost btn-sm" data-action="add-cat" data-bucket="${b}">${I.plus} Kategori</button>
      </div>
      ${rows}
      <div class="subtotal">
        <span style="color:var(--ink-soft)">Budgeterat · spenderat ${kr(spent)}</span>
        <span><b class="tnum">${kr(budget)}</b> <span style="color:var(--ink-soft);font-weight:400">/ mål ${kr(tgt)} (${Math.round(m.target*100)}%)</span></span>
      </div>
    </div>`;
  }).join('');

  const action = `<button class="btn" data-action="add-income">${I.plus} Inkomst</button>`;
  const incBox = `<div class="card" style="padding:16px 20px;margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div><div class="lbl" style="font-size:12px;color:var(--ink-soft);font-weight:600">Inkomst / månad</div>
        <div style="font-family:var(--font-display);font-weight:800;font-size:26px" class="tnum">${kr(inc)}</div></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
        ${state.income.map(i=>`<span class="tag" style="background:var(--line-soft);color:var(--ink);font-size:12px;padding:5px 11px">
          ${esc(i.name)} · ${kr(i.amount)}
          <button class="iconbtn" style="width:18px;height:18px;display:inline-grid;vertical-align:-4px" data-action="edit-income" data-id="${i.id}">${I.edit}</button>
          <button class="iconbtn" style="width:18px;height:18px;display:inline-grid;vertical-align:-4px" data-action="del-income" data-id="${i.id}">${I.trash}</button>
        </span>`).join('') || '<span style="color:var(--ink-soft);font-size:13px">Lägg till din lön för att budgetera mot den.</span>'}
      </div>
    </div></div>`;

  return head('50 / 30 / 20', 'Budget', 'Behov 50% · Önskningar 30% · Sparande & skuld 20%', action) + banner + incBox + sections;
}

/* ===================== TRANSAKTIONER ===================== */
function viewTrans(){
  const all = [...state.transactions].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const monthSpent = spentTotal();
  const action = `<button class="btn btn-ghost" data-action="import-csv">${I.upload} Importera</button><button class="btn" data-action="add-trans">${I.plus} Lägg till</button>`;

  if(!all.length){
    return head('Utgifter', 'Transaktioner', null, action) +
      `<div class="card empty"><h3>Inga transaktioner</h3>
       <p>Här loggar du vad du faktiskt spenderar. Lägg in en utgift så uppdateras budgeten direkt.</p>
       <button class="btn" data-action="add-trans">${I.plus} Lägg till transaktion</button></div>`;
  }

  const summary = `<div class="card" style="padding:15px 20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
    <span style="color:var(--ink-soft);font-size:13.5px">Spenderat i ${monthLabel().toLowerCase()}</span>
    <span style="font-family:var(--font-display);font-weight:800;font-size:24px" class="tnum">${kr(monthSpent)}</span></div>`;

  // gruppera per datum
  const groups = {};
  all.forEach(t=>{ (groups[t.date]=groups[t.date]||[]).push(t); });
  const dates = Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  const list = dates.map(date=>`
    <div style="font-size:12px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 8px 2px">${dShort(date)}</div>
    <div class="card"><div class="rows">${groups[date].map(txRow).join('')}</div></div>`).join('');

  return head('Utgifter', 'Transaktioner', null, action) + summary + list;
}

/* ===================== SPARMÅL ===================== */
function viewGoals(){
  const action = `<button class="btn" data-action="add-goal">${I.plus} Nytt sparmål</button>`;
  if(!state.goals.length){
    return head('Mål', 'Sparmål', null, action) +
      `<div class="card empty"><h3>Inga sparmål än</h3>
       <p>Buffert, resa, kontantinsats — sätt ett mål och följ hur du närmar dig det.</p>
       <button class="btn" data-action="add-goal">${I.plus} Skapa sparmål</button></div>`;
  }
  return head('Mål', 'Sparmål', 'Det du sparar ihop till', action) +
    `<div class="grid cols-2">${state.goals.map(goalCard).join('')}</div>`;
}
function goalCard(g){
  const p = clampPct(pct(g.saved,g.target));
  const done = g.saved>=g.target && g.target>0;
  const left = Math.max(0, g.target - g.saved);
  return `<div class="card goal">
    <h3>${esc(g.name)}${done?'<span class="tag good">uppnått</span>':''}</h3>
    <div class="gmeta">${g.deadline?('Mål: '+dShort(g.deadline)) : 'Sparmål'}</div>
    <div class="gnums"><span class="gcur tnum">${kr(g.saved)}</span><span class="gtar tnum">av ${kr(g.target)}</span></div>
    <div class="bar"><i style="width:${p}%;background:var(--spar)"></i></div>
    <div class="gfoot">
      <span class="gleft">${done?'Klart!':kr(left)+' kvar · '+p+'%'}</span>
      <span style="display:flex;gap:4px">
        <button class="btn btn-ghost btn-sm" data-action="contribute" data-id="${g.id}">${I.plus} Spara</button>
        <button class="iconbtn" data-action="edit-goal" data-id="${g.id}">${I.edit}</button>
        <button class="iconbtn" data-action="del-goal" data-id="${g.id}">${I.trash}</button>
      </span>
    </div>
  </div>`;
}

/* ===================== SKULDER ===================== */
function viewDebts(){
  const action = `<button class="btn" data-action="add-debt">${I.plus} Ny skuld</button>`;
  if(!state.debts.length){
    return head('Avbetalning', 'Skulder', null, action) +
      `<div class="card empty"><h3>Inga skulder registrerade</h3>
       <p>Lägg in lån och krediter med ränta, så ordnar appen dem efter lavinmetoden — högst ränta först.</p>
       <button class="btn" data-action="add-debt">${I.plus} Lägg till skuld</button></div>`;
  }
  const total = sum(state.debts.map(d=>d.balance));
  const minTot = sum(state.debts.map(d=>d.min));
  const ordered = [...state.debts].sort((a,b)=>b.apr-a.apr);

  const banner = `<div class="banner warn"><div class="bicon">${I.info}</div>
    <div>Total skuld <b class="tnum">${kr(total)}</b> · minsta betalning <b class="tnum">${kr(minTot)}</b>/mån.
    Lägg allt extra på skulden överst — den har högst ränta.</div></div>`;

  const rows = ordered.map((d,i)=>`
    <div class="row">
      <div class="lead">
        <div class="avatar" style="background:var(--debt-bg);color:var(--debt)">${esc((d.name||'?').charAt(0).toUpperCase())}</div>
        <div style="min-width:0">
          <div class="title">${esc(d.name)}${i===0?'<span class="tag warn">betala först</span>':''}</div>
          <div class="meta">${(Number(d.apr)||0).toString().replace('.',',')}% ränta · minst ${kr(d.min)}/mån</div>
        </div>
      </div>
      <div class="amt tnum">${kr(d.balance)}</div>
      <div class="actions">

    <div class="note">Återkommande avgifter äter tyst upp budgeten. Gå igenom listan — det här är de enklaste kronorna att få tillbaka.</div>
    </div>` : '';

  return head('Den här månaden', 'Insikter', monthLabel(), '') + donutCard + topHtml + vsHtml + recHtml;
}

function donutSvg(data, total){
  const r=62, cx=85, cy=85, w=22, C=2*Math.PI*r;
  if(total<=0) return `<svg viewBox="0 0 170 170"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--line-soft)" stroke-width="${w}"/></svg>`;
  let cum=0;
  const segs = data.map(d=>{
    const len = d.value/total*C;
    const s = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${w}" stroke-linecap="butt" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-cum}"/>`;
    cum += len; return s;
  }).join('');
  return `<svg viewBox="0 0 170 170"><g transform="rotate(-90 ${cx} ${cy})">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--line-soft)" stroke-width="${w}"/>${segs}</g></svg>`;
}

/* ============================================================
   CSV-IMPORT  (bank-/Avanza-export -> transaktioner)
   ============================================================ */
function triggerCsvPick(){ const el=document.getElementById('csvfile'); if(el){ el.value=''; el.click(); } }
function csvDetectDelim(line){
  const cand={';':0, ',':0, '\t':0};
  for(const d in cand){ cand[d]=(line.split(d).length-1); }
  let best=';', n=-1; for(const d in cand){ if(cand[d]>n){ n=cand[d]; best=d; } }
  return n>0?best:';';
}
function csvParse(text, delim){
  text=String(text).replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const rows=[]; let row=[], f='', i=0, q=false;
  while(i<text.length){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){ f+='"'; i+=2; continue; } q=false; i++; continue; }
      f+=c; i++; continue;
    }
    if(c==='"'){ q=true; i++; continue; }
    if(c===delim){ row.push(f); f=''; i++; continue; }
    if(c==='\n'){ row.push(f); rows.push(row); row=[]; f=''; i++; continue; }
    f+=c; i++;
  }
  if(f.length||row.length){ row.push(f); rows.push(row); }
  return rows.filter(r=>r.length && !(r.length===1 && r[0].trim()===''));
}
function csvAmount(raw){
  if(raw==null) return NaN;
  let s=String(raw).replace(/\u00a0/g,' ').trim();
  if(!s) return NaN;
  s=s.replace(/\u2212/g,'-').replace(/\s/g,'').replace(/kr|sek/ig,'');
  if(s.indexOf(',')>-1 && s.indexOf('.')>-1){ s=s.replace(/\./g,'').replace(',', '.'); }
  else if(s.indexOf(',')>-1){ s=s.replace(',', '.'); }
  s=s.replace(/[^0-9.\-]/g,'');
  const n=parseFloat(s); return isNaN(n)?NaN:n;
}
function csvDate(raw){
  if(!raw) return null;
  const s=String(raw).trim(); let m;
  if((m=s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/))) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  if((m=s.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/))) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  if((m=s.match(/^(\d{1,2})[\/.](\d{1,2})[\/.](\d{4})/))) return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
  if((m=s.match(/^(\d{8})$/))) return m[1].slice(0,4)+'-'+m[1].slice(4,6)+'-'+m[1].slice(6,8);
  const dt=new Date(s); if(!isNaN(dt.getTime())) return dt.toISOString().slice(0,10);
  return null;
}
function csvGuess(headers, keys){
  for(let i=0;i<headers.length;i++){ const h=String(headers[i]).toLowerCase(); if(keys.some(k=>h.indexOf(k)>-1)) return i; }
  return -1;
}
function csvReadFile(f){
  const r1=new FileReader();
  r1.onerror=()=>alert('Kunde inte läsa filen.');
  r1.onload=ev=>{
    let text=String(ev.target.result);
    if(text.indexOf('\uFFFD')>-1){
      const r2=new FileReader();
      r2.onload=ev2=>csvAfterRead(String(ev2.target.result));
      r2.onerror=()=>csvAfterRead(text);
      r2.readAsText(f,'windows-1252');
    } else csvAfterRead(text);
  };
  r1.readAsText(f,'utf-8');
}
function csvAfterRead(text){
  const first=(text.split('\n').find(l=>l.trim().length))||'';
  const delim=csvDetectDelim(first);
  const rows=csvParse(text, delim);
  if(rows.length<2){ alert('Filen verkar tom eller saknar rader att importera.'); return; }
  csvImportRows=rows;
  mImport();
}
function mImport(){
  const rows=csvImportRows; if(!rows){ return; }
  const headers=rows[0].map((h,i)=> (String(h).trim()||('Kolumn '+(i+1))) );
  const body=rows.slice(1);
  const gD=csvGuess(headers,['datum','date','bokf','transaktionsdag','affärsdag','affarsdag']);
  const gT=csvGuess(headers,['text','beskriv','description','transaktion','specifikation','meddelande','mottagare','butik','namn','typ']);
  const gA=csvGuess(headers,['belopp','amount','summa','sum']);
  const opts=headers.map((h,i)=>({v:String(i), l:h}));
  const head2='<tr>'+headers.map(h=>'<th>'+esc(h)+'</th>').join('')+'</tr>';
  const preview=body.slice(0,5).map(r=>'<tr>'+headers.map((h,i)=>'<td>'+esc(String(r[i]==null?'':r[i]).slice(0,22))+'</td>').join('')+'</tr>').join('');
  const catOpts=[{v:'',l:'Lämna okategoriserade'}].concat(state.categories.map(c=>({v:c.id,l:c.name})));
  const modeOpts=[{v:'expenses',l:'Endast utgifter (negativa belopp)'},{v:'all',l:'Alla rader (som utgifter)'}];
  openModal('<h2>Importera CSV</h2>'+
    '<p class="msub">'+body.length+' rader hittades. Koppla kolumnerna för datum, text och belopp.</p>'+
    '<div class="imp-preview"><table>'+head2+preview+'</table></div>'+
    selectField('imp_date','Datum-kolumn',opts,String(gD>-1?gD:0))+
    selectField('imp_desc','Text-kolumn',opts,String(gT>-1?gT:Math.min(1,headers.length-1)))+
    selectField('imp_amt','Belopp-kolumn',opts,String(gA>-1?gA:Math.max(0,headers.length-1)))+
    selectField('imp_mode','Vilka rader',modeOpts,'expenses')+
    selectField('imp_cat','Lägg i kategori',catOpts,'')+
    '<div class="note" style="margin-top:6px">Negativa belopp tolkas som utgifter. Du kan kategorisera transaktionerna efteråt.</div>'+
    actions('Importera'), csvDoImport);
}
function csvDoImport(){
  const rows=csvImportRows; if(!rows) return;
  const body=rows.slice(1);
  const ci=parseInt(val('imp_date'),10)||0;
  const cd=parseInt(val('imp_desc'),10)||0;
  const ca=parseInt(val('imp_amt'),10)||0;
  const mode=val('imp_mode')||'expenses';
  const defCat=val('imp_cat')||null;
  let added=0, skipped=0;
  body.forEach(r=>{
    const date=csvDate(r[ci]);
    const amt=csvAmount(r[ca]);
    const desc=(r[cd]==null?'':String(r[cd])).trim();
    if(date===null || isNaN(amt)){ skipped++; return; }
    if(mode==='expenses' && amt>=0){ skipped++; return; }
    const amount=Math.abs(amt);
    if(amount===0){ skipped++; return; }
    state.transactions.push({id:uid(), desc:desc||'Importerad', categoryId:defCat, amount, date, recurring:false});
    added++;
  });
  csvImportRows=null;
  setTimeout(function(){ alert('Importerade '+added+' transaktioner.'+(skipped?(' '+skipped+' rader hoppades över (gick inte att tolka, eller var inkomster).'):'')); }, 60);
}

  if(!a) return;
  const act = a.dataset.action, id = a.dataset.id, bucket = a.dataset.bucket;

  switch(act){
    case 'settings': mSettings(); break;
    case 'import-csv': triggerCsvPick(); break;
    case 'modal-cancel': closeModal(); break;
    case 'modal-save': if(modalSave){ modalSave(); } closeModal(); commit(); break;

    case 'add-income': mIncome(); break;
    case 'edit-income': mIncome(id); break;
    case 'del-income': if(confirmDel('Ta bort inkomsten?')){ state.income=state.income.filter(x=>x.id!==id); commit(); } break;

    case 'add-cat': mCategory(null,bucket); break;
    case 'edit-cat': mCategory(id); break;
    case 'del-cat': if(confirmDel('Ta bort kategorin? Transaktioner i den blir okategoriserade.')){ state.categories=state.categories.filter(x=>x.id!==id); commit(); } break;

    case 'add-trans': mTrans(); break;
    case 'edit-trans': mTrans(id); break;
    case 'del-trans': if(confirmDel('Ta bort transaktionen?')){ state.transactions=state.transactions.filter(x=>x.id!==id); commit(); } break;

    case 'add-goal': mGoal(); break;
    case 'edit-goal': mGoal(id); break;
    case 'del-goal': if(confirmDel('Ta bort sparmålet?')){ state.goals=state.goals.filter(x=>x.id!==id); commit(); } break;
    case 'contribute': mContribute(id); break;

    case 'add-debt': mDebt(); break;
    case 'edit-debt': mDebt(id); break;
    case 'del-debt': if(confirmDel('Ta bort skulden?')){ state.debts=state.debts.filter(x=>x.id!==id); commit(); } break;
    case 'pay-debt': mPay(id); break;

    case 'reset-demo': if(confirmDel('Ersätt med exempeldata? Det skriver över det du har nu.')){ state=seedState(); closeModal(); commit(); } break;
    case 'reset-empty': if(confirmDel('Töm all data? Det går inte att ångra.')){ state=emptyState(); closeModal(); commit(); } break;
  }
});

// stäng modal vid klick utanför
overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
(function(){ const ci=document.getElementById('csvfile'); if(ci){ ci.addEventListener('change', e=>{ const f=e.target.files&&e.target.files[0]; if(f) csvReadFile(f); }); } })();
// enter sparar i modal
document.addEventListener('keydown', e=>{
  if(e.key==='Escape' && overlay.classList.contains('open')){ closeModal(); }
  if(e.key==='Enter' && overlay.classList.contains('open') && e.target.tagName!=='SELECT'){
    if(modalSave){ e.preventDefault(); modalSave(); closeModal(); commit(); }
  }
});

/* ============================================================
   START
   ============================================================ */
async function init(){
  await load();
  renderNav();
  render();
}
init();
</script>
